# =============================================================================================
# 매번 aws secrets에서 필요한 정보를 가져와야해서 composite로 간략화 하는 부분 및 ssh-agent 사용 부분
# =============================================================================================

name: 'Setup Ansible Environment'
description: 'AWS 인증 + SSH 키 다운로드'

inputs:
  aws-access-key-id:
    required: true
  aws-secret-access-key:
    required: true
  bastion-ssh-key:
    required: true
  ansible-ssh-key:
    required: true

runs:
  using: 'composite'
  steps:
      # 1. AWS 인증
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ap-northeast-2

    # 2. AWS Secrets Manager → ~/.ssh/ 파일 저장 (bootstrap inventory용)
    - name: Fetch SSH keys
      shell: bash
      run: |
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        for key in project01-bastion-key project01-was-key project01-db-key; do
          aws secretsmanager get-secret-value \
            --secret-id "ssh-keys/${key}" \
            --query SecretString --output text > ~/.ssh/${key}.pem
          chmod 600 ~/.ssh/${key}.pem
        done

    # 3. GitHub Secrets의 키를 ssh-agent에 등록 (dev inventory용)
    - name: Start ssh-agent and add keys
      shell: bash
      run: |
        eval "$(ssh-agent -s)"
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

        echo "${{ inputs.bastion-ssh-key }}" | ssh-add -
        echo "${{ inputs.ansible-ssh-key }}" | ssh-add -

      # ssh-add -l 디버깅용 ssh agent 목록 보기