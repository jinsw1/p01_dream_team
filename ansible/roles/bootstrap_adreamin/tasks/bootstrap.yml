---
- name: "adreamin 계정 생성"
  user:
    name: adreamin
    shell: /bin/bash
    groups: "{{ 'wheel' if ansible_os_family == 'RedHat' else 'sudo' }}" # RedHat/Amazon Linux 계열은 wheel, Ubuntu/Debian 계열은 sudo
    append: yes
    create_home: yes
    state: present

- name: "adreamin sudo 권한 설정" 
  copy:
    dest: "/etc/sudoers.d/adreamin"
    content: "adreamin ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"

- name: "adreamin .ssh폴더 생성"
  file:
    path: /home/adreamin/.ssh
    state: directory
    owner: adreamin
    group: adreamin
    mode: "0700"

- name: "authorized_keys 복사"
  copy:
    src: /home/ec2-user/.ssh/authorized_keys
    dest: /home/adreamin/.ssh/authorized_keys
    remote_src: yes
    owner: adreamin
    group: adreamin
    mode: "0600"

- name: "목록 최신화를 위한 cache update"
  dnf:
    update_cache: yes

- name: "기본 패키지 설치"
  dnf:
    name:
      - git
      - python3
      - python3-pip
      - unzip
      - wget
      - tar
    state: present

