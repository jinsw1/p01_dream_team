---
- name: "adreamin 계정 생성"
  user:
    name: adreamin
    shell: /bin/bash
    groups: "{{ 'wheel' if ansible_os_family == 'RedHat' else 'sudo' }}" # RedHat/Amazon Linux 계열은 wheel, Ubuntu/Debian 계열은 sudo
    append: yes
    create_home: yes
    state: present

- name: "adreamin sudo 권한 설정" 
  copy:
    dest: "/etc/sudoers.d/adreamin"
    content: "adreamin ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"

- name: "adreamin .ssh폴더 생성"
  file:
    path: /home/adreamin/.ssh
    state: directory
    owner: adreamin
    group: adreamin
    mode: "0700"

- name: "bastion 공개키 등록"
  authorized_key:
    user: adreamin
    state: present
    key: "{{ lookup('file', '~/.ssh/bastion-key.pem.pub') }}"
  when: "'bastion' in group_names"

- name: "was & db 공개키 등록"
  authorized_key:
    user: adreamin
    state: present
    key: "{{ lookup('file', '~/.ssh/ansible-key.pem.pub') }}"
  when: "'was' in group_names or 'db' in group_names"

- name: "목록 최신화를 위한 cache update"
  dnf:
    update_cache: yes

- name: "기본 패키지 설치"
  dnf:
    name:
      - git
      - python3
      - python3-pip
      - unzip
      - wget
      - tar
    state: present
