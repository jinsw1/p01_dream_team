---
- name: "postgresql 필수 패키지 설치"
  dnf:
    name:
      - postgresql-server
      - postgresql-contrib
      - python3-psycopg2
    state: present

- name: "db 초기화"
  command: postgresql-setup --initdb
  args:
    creates: "{{ pg_data_dir }}/PG_VERSION"
  
- name: "외부 접속 허용"
  lineinfile:
    path: "{{ pg_conf_path }}"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
    state: present
  notify: restart_postgres

- name: "locahost 에서 비밀번호로 접속 할수 있게 허용"
  replace:
    path: "{{ pg_hba_path }}"
    regexp: '^(host\s+all\s+all\s+(127\.0\.0\.1\/32|::1\/128)\s+)(ident|scram-sha-256|trust|peer)$'
    replace: '\1md5'
  notify: restart_postgres

- name: "외부 아이피 대역  (0.0.0.0/0) md5 접속 허용 룰 추가"
  lineinfile:
    path: "{{ pg_hba_path }}"
    line: "host     all     all     0.0.0.0/0     md5"
    insertafter: EOF
  notify: restart_postgre

- name: "postgre서비스 시작 및 재부팅시 자동 실행 설정"
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: "계정 생성 & db 생성"
  become: yes
  become_user: postgres

  block:

    - name: "사용자 계정 생성 및 비밀번호 부여"
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_pass }}"


    - name: "신규 db 생성 및 소유권 부여"
      postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"

    - name: "postgres 슈퍼 유저 비밀번호 설정"
      postgresql_user:
        name: postgres
        password: "postgres"
