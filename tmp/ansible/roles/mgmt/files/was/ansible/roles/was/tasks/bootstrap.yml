---
- name: "user1 계정 생성"
  user:
    name: user1
    shell: /bin/bash
    groups: "{{ 'wheel' if ansible_os_family == 'RedHat' else 'sudo' }}"
    append: yes
    create_home: yes
    state: present

- name: "user1 sudo 권한 설정"
  copy:
    dest: "/etc/sudoers.d/user1"
    content: "user1 ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"

- name: "user1 .ssh폴더 생성"
  file:
    path: /home/user1/.ssh
    state: directory
    owner: user1
    group: user1
    mode: "0700"

- name: "authorized_keys 복사"
  copy:
    src: /home/ec2-user/.ssh/authorized_keys
    dest: /home/user1/.ssh/authorized_keys
    remote_src: yes
    owner: user1
    group: user1
    mode: "0600"

- name: "목록 최신화를 위한 cache update"
  dnf:
    update_cache: yes

- name: "기본 패키지 설치"
  dnf:
    name:
      - git
      - python3
      - python3-pip
      - unzip
      - wget
      - tar
    state: present
